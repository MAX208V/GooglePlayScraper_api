version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "automerge"
    # 当 google-play-scraper 更新时自动创建 PR
    allow:
      - dependency-name: "google-play-scraper"
        dependency-type: "direct"
